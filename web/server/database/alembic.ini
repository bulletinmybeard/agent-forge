# Alembic config for the AgentForge chat database (web.server.database).
# Runtime URL is set programmatically — do not hard-code secrets here.

[alembic]
script_location = web/server/database/migrations
prepend_sys_path = .
version_path_separator = os

# Overridden at runtime by migrate._alembic_config()
sqlalchemy.url = sqlite:///./data/agentforge_chat.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
